<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brugg // Paranormal Index</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;700&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #6BFF8A; /* Alien Phosphor Green */
            --accent-hazard: #ff3e3e;
            --bg: #0a0a0c;
            --panel: rgba(15, 15, 20, 0.9);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: #d1d1d1;
            margin: 0;
            overflow: hidden;
        }

        h1, h2, h3, .tech-font {
            font-family: 'Space Grotesk', sans-serif;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        #map {
            height: 100vh;
            width: 100vw;
            background: #000;
        }

        /* Minimalist Leaflet Overrides */
        .leaflet-container { background: #000 !important; }
        .leaflet-bar { border: none !important; }
        .leaflet-bar a { 
            background-color: var(--panel) !important; 
            color: var(--accent) !important; 
            border: 1px solid rgba(107, 255, 138, 0.2) !important;
        }

        /* Cinematic UI Overlay */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1000;
            border: 1px solid rgba(107, 255, 138, 0.1);
            box-shadow: inset 0 0 100px rgba(0, 0, 0, 0.8);
        }

        .side-panel {
            position: absolute;
            background: var(--panel);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(107, 255, 138, 0.2);
            z-index: 1001;
            padding: 24px;
            pointer-events: auto;
            display: flex;
            flex-direction: column;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #sidePanel {
            top: 20px;
            right: 20px;
            width: 380px;
            max-height: calc(100vh - 40px);
        }

        #manifestPanel {
            top: 130px;
            left: 20px;
            width: 300px;
            max-height: calc(100vh - 180px);
        }

        .side-panel.hidden { transform: translateX(420px); }
        #manifestPanel.hidden { transform: translateX(-350px); }

        .scanline {
            width: 100%;
            height: 2px;
            background: rgba(107, 255, 138, 0.05);
            position: absolute;
            top: 0;
            animation: scan 10s linear infinite;
        }

        @keyframes scan {
            0% { top: 0; }
            100% { top: 100%; }
        }

        /* Standard Circular Marker */
        .marker-pulse {
            width: 14px;
            height: 14px;
            background: var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 0 rgba(107, 255, 138, 0.4);
            animation: pulse 2s infinite;
        }

        /* Creature/Hazard Marker */
        .marker-pulse-hazard {
            width: 18px;
            height: 18px;
            background: var(--accent-hazard);
            border-radius: 50%;
            box-shadow: 0 0 0 rgba(255, 62, 62, 0.4);
            animation: pulse-hazard 1.5s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(107, 255, 138, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(107, 255, 138, 0); }
            100% { box-shadow: 0 0 0 0 rgba(107, 255, 138, 0); }
        }

        @keyframes pulse-hazard {
            0% { box-shadow: 0 0 0 0 rgba(255, 62, 62, 0.7); }
            70% { box-shadow: 0 0 0 20px rgba(255, 62, 62, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 62, 62, 0); }
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--accent); }

        .manifest-item {
            border-bottom: 1px solid rgba(107, 255, 138, 0.1);
            padding: 10px 0;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .manifest-item:hover {
            color: var(--accent);
            padding-left: 8px;
            background: rgba(107, 255, 138, 0.05);
        }

        .btn-archive {
            pointer-events: auto;
            background: rgba(107, 255, 138, 0.05);
            border: 1px solid rgba(107, 255, 138, 0.3);
            padding: 6px 16px;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 10px;
            color: var(--accent);
            transition: all 0.3s;
            cursor: pointer;
        }
        .btn-archive:hover {
            background: var(--accent);
            color: #000;
        }
    </style>
</head>
<body>

    <div class="overlay">
        <div class="scanline"></div>
        <div class="absolute bottom-10 left-10 tech-font text-[10px] opacity-40">
            LOC_BRUGG_SWITZERLAND // 47.4853° N, 8.2085° E<br>
            STREAMS: ACTIVE // SENSORS: NOMINAL
        </div>
    </div>

    <div id="map"></div>

    <!-- Manifest Navigation -->
    <div id="manifestPanel" class="side-panel hidden">
        <div class="flex justify-between items-center mb-6">
            <h3 class="text-sm font-bold text-[#6BFF8A] tech-font">Data Manifest</h3>
            <button onclick="toggleManifest()" class="text-[10px] opacity-50 hover:opacity-100">[ HIDE ]</button>
        </div>
        <div id="manifestList" class="overflow-y-auto pr-2">
            <!-- Dynamic items populated by JS -->
        </div>
    </div>

    <!-- Detail Panel -->
    <div id="sidePanel" class="side-panel hidden">
        <div class="flex justify-between items-start mb-4">
            <h2 id="eventTitle" class="text-xl font-bold text-[#6BFF8A]">Select Node</h2>
            <button onclick="closePanel()" class="text-xs opacity-50 hover:opacity-100">[ CLOSE ]</button>
        </div>
        <div class="text-[10px] text-[#6BFF8A] mb-4 tech-font opacity-70">
            Subject: <span id="eventSubject">N/A</span><br>
            Coordinates: <span id="eventCoords">N/A</span>
        </div>
        <div id="eventContent" class="overflow-y-auto text-sm leading-relaxed text-gray-300 border-t border-[#6BFF8A]/20 pt-4">
            Select a highlighted data point on the map to decrypt historical records.
        </div>
        <div class="mt-auto pt-6 tech-font text-[9px] opacity-30">
            VERIFIED_RECORD_774-B // ACCESS_PUBLIC // MU-TH-UR
        </div>
    </div>

    <!-- Header Overlay -->
    <div class="absolute top-8 left-10 z-[1001]">
        <h1 class="text-3xl font-bold text-white mb-1 tracking-tighter">BRUGG <span class="text-[#6BFF8A]">MYTHS</span></h1>
        <div class="h-[1px] w-40 bg-[#6BFF8A]/40 mb-4"></div>
        <button onclick="toggleManifest()" class="btn-archive">
            OPEN ARCHIVE MANIFEST
        </button>
    </div>

    <script>
        const events = [
            { id: 1, title: "The Black Tower", subject: "Residual Haunting", coords: [47.486070, 8.206665], content: "Built in the 12th century, the 'Schwarzer Turm' is Brugg's oldest structure. Locals report a silent figure watching from the upper windows during the winter solstice. Historical records mention a jailer who disappeared in 1644 without a trace.", type: "Ghost" },
            { id: 2, title: "Aare River Whispers", subject: "Auditory Phenomenon", coords: [47.4862, 8.2120], content: "At the narrowest point of the Aare, near the bridge, cyclists often report hearing their names called from beneath the rushing water. Legend speaks of 'River Maidens' pulling the curious into the currents.", type: "Myth" },
            { id: 3, title: "Vindonissa Ruins", subject: "Legionary Shadows", coords: [47.4795, 8.2215], content: "Former Roman Legion camp. Night guards recorded thermal anomalies in the shape of marching formations. Some say the 11th Legion never truly abandoned their post.", type: "Paranormal" },
            { id: 4, title: "Prophet's Alley", subject: "Prophetic Vision", coords: [47.4855, 8.2090], content: "A hidden passage where a local predicted the Great Fire of Brugg. Legend says walking the alley backwards at midnight reveals the town's ancient visage.", type: "Dark Event" },
            { id: 5, title: "The Siechenhaus", subject: "The Bell of the Unclean", coords: [47.4890, 8.2160], content: "Located beyond the city walls, this was an infirmary for lepers. They were forced to carry bells to warn citizens of their presence. Rhythmic clicking sounds are still reported nearby on moonless nights.", type: "Dark Event" },
            { id: 6, title: "Roman Curse Tablets", subject: "The Defixio of Vindonissa", coords: [47.4785, 8.2185], content: "Archaeologists found lead tablets used to hire underworld demons for spiritual hit-lists. The secret grudges of ancient legionaries are said to linger in the damp earth.", type: "Ancient Curse" },
            { id: 7, title: "The Three Knocks", subject: "The Tower's Hidden Vault", coords: [47.486120, 8.206750], content: "A tiny unmarked door on the Black Tower. Knocking three times is said to alert the 'Invisible Sentinel.' Some claim the door leads to a vault missing from all city plans.", type: "Secret Code" },
            { id: 8, title: "The Pope of Dross", subject: "The Great Comic Book Fire", coords: [47.483293, 8.207236], content: "In 1965, authorities held a public 'cleansing' of comic books. The phantom scent of scorched paper is said to linger near the site during dry evenings.", type: "Historical Cleansing" },
            { id: 9, title: "The Chlauschlöpfen", subject: "The Midnight Whip-Crackers", coords: [47.4852, 8.2076], content: "Ancient tradition where deafening whip-cracks echo through the streets to drive away winter spirits. Rhythmic and thunderous, it serves as a warning to both spirits and strangers.", type: "Ancient Ritual" },
            { id: 10, title: "The Rollibock", subject: "The Glacier Guardian", coords: [47.495050, 8.215560], content: "Massive ice-encrusted goat-like entity with glowing eyes. Protectors of nature, it punishes those who mistreat the environment with terrifying roars and clattering ice shards.", type: "Creature" },
            { id: 11, title: "The Night Folk", subject: "Das Nachtvolk Procession", coords: [47.485150, 8.207800], content: "Spectral midnight procession of the recently deceased observed near the Stadtkirche. Witnessing your own doppelgänger in the line is a death sentence within six weeks.", type: "Creature" },
            { id: 12, title: "The Black Cat", subject: "Forest Maze Sentinel", coords: [47.491500, 8.204500], content: "A local Bruggerberg myth. A black cat that perches on the shoulders of travelers in the woods. As long as it sits there, you are unable to find the exit.", type: "Creature" }
        ];

        const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([47.485, 8.210], 15);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom: 20 }).addTo(map);
        L.control.zoom({ position: 'bottomright' }).addTo(map);

        function openEvent(event) {
            document.getElementById('eventTitle').innerText = event.title;
            document.getElementById('eventSubject').innerText = event.subject;
            document.getElementById('eventCoords').innerText = `${event.coords[0]}, ${event.coords[1]}`;
            document.getElementById('eventContent').innerText = event.content;
            document.getElementById('sidePanel').classList.remove('hidden');
            const titleEl = document.getElementById('eventTitle');
            titleEl.style.color = (event.type === 'Creature') ? 'var(--accent-hazard)' : 'var(--accent)';
        }

        function closePanel() { document.getElementById('sidePanel').classList.add('hidden'); }
        function toggleManifest() { document.getElementById('manifestPanel').classList.toggle('hidden'); }

        const manifestList = document.getElementById('manifestList');
        events.forEach(event => {
            const isHazard = event.type === 'Creature';
            const iconClass = isHazard ? 'marker-pulse-hazard' : 'marker-pulse';
            
            const icon = L.divIcon({
                className: 'custom-div-icon',
                html: `<div class="${iconClass}"></div>`,
                iconSize: [20, 20],
                iconAnchor: [10, 10]
            });
            const marker = L.marker(event.coords, { icon: icon }).addTo(map);
            marker.on('click', () => {
                map.flyTo(event.coords, 17, { duration: 1.5 });
                openEvent(event);
            });

            const item = document.createElement('div');
            item.className = 'manifest-item';
            item.innerHTML = `<span>${event.id < 10 ? '0' + event.id : event.id} // ${event.title}</span>`;
            item.onclick = () => {
                map.flyTo(event.coords, 16, { duration: 2 });
                openEvent(event);
            };
            manifestList.appendChild(item);
        });

        map.on('click', () => closePanel());
    </script>
</body>
</html>
