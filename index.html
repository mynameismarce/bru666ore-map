<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Brugg // Paranormal Index</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;700&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #6BFF8A; /* Alien Phosphor Green */
            --accent-hazard: #ff3e3e;
            --bg: #0a0a0c;
            --panel: rgba(15, 15, 20, 0.95);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: #d1d1d1;
            margin: 0;
            overflow: hidden;
            touch-action: none;
        }

        h1, h2, h3, .tech-font {
            font-family: 'Space Grotesk', sans-serif;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        #map {
            height: 100vh;
            width: 100vw;
            background: #000;
        }

        .leaflet-container { background: #000 !important; }
        .leaflet-bar { border: 1px solid rgba(107, 255, 138, 0.5) !important; box-shadow: 0 0 10px rgba(0,0,0,0.5); }
        .leaflet-bar a { 
            background-color: var(--panel) !important; 
            color: var(--accent) !important; 
            border: none !important;
            width: 34px !important;
            height: 34px !important;
            line-height: 34px !important;
        }

        .side-panel {
            position: absolute;
            background: var(--panel);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(107, 255, 138, 0.2);
            z-index: 2000;
            padding: 24px;
            pointer-events: auto;
            display: flex;
            flex-direction: column;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #sidePanel {
            top: 20px;
            right: 20px;
            width: 380px;
            max-height: calc(100vh - 40px);
        }

        #manifestPanel {
            top: 140px;
            left: 20px;
            width: 300px;
            max-height: calc(100vh - 180px);
        }

        .side-panel.hidden { transform: translateX(120%); }
        #manifestPanel.hidden { transform: translateX(-120%); }

        @media (max-width: 640px) {
            #sidePanel {
                top: auto;
                bottom: 0;
                right: 0;
                left: 0;
                width: 100%;
                max-width: 100%;
                border-radius: 20px 20px 0 0;
                max-height: 70vh;
                padding: 20px;
            }
            #sidePanel.hidden { transform: translateY(100%); }
            #manifestPanel {
                top: 100px;
                left: 10px;
                right: 10px;
                width: auto;
                max-height: calc(100vh - 120px);
            }
        }

        /* Specialized Triangle Indicators */
        .edge-triangle {
            position: fixed;
            width: 0; 
            height: 0; 
            border-left: 10px solid transparent;
            border-right: 10px solid transparent;
            border-bottom: 16px solid #FFFFFF; /* Solid White */
            z-index: 1500;
            opacity: 0.8;
            pointer-events: auto;
            cursor: pointer;
            filter: drop-shadow(0 0 8px #FFFFFF);
            transition: opacity 0.2s, transform 0.1s;
        }
        
        .edge-triangle:hover {
            opacity: 1;
            filter: drop-shadow(0 0 12px #FFFFFF);
        }

        .scanline {
            width: 100%;
            height: 2px;
            background: rgba(107, 255, 138, 0.05);
            position: absolute;
            top: 0;
            animation: scan 10s linear infinite;
        }

        @keyframes scan {
            0% { top: 0; }
            100% { top: 100%; }
        }

        .marker-pulse {
            width: 14px;
            height: 14px;
            background: var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 0 rgba(107, 255, 138, 0.4);
            animation: pulse 2s infinite;
        }

        .marker-pulse-hazard {
            width: 18px;
            height: 18px;
            background: var(--accent-hazard);
            border-radius: 50%;
            box-shadow: 0 0 0 rgba(255, 62, 62, 0.4);
            animation: pulse-hazard 1.5s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(107, 255, 138, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(107, 255, 138, 0); }
            100% { box-shadow: 0 0 0 0 rgba(107, 255, 138, 0); }
        }

        @keyframes pulse-hazard {
            0% { box-shadow: 0 0 0 0 rgba(255, 62, 62, 0.7); }
            70% { box-shadow: 0 0 0 20px rgba(255, 62, 62, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 62, 62, 0); }
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--accent); }

        .manifest-item {
            border-bottom: 1px solid rgba(107, 255, 138, 0.1);
            padding: 12px 0;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .manifest-item:hover {
            color: var(--accent);
            padding-left: 8px;
            background: rgba(107, 255, 138, 0.05);
        }

        .btn-archive, .btn-return {
            pointer-events: auto;
            background: rgba(107, 255, 138, 0.05);
            border: 1px solid rgba(107, 255, 138, 0.3);
            padding: 8px 16px;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 10px;
            color: var(--accent);
            transition: all 0.3s;
            cursor: pointer;
            text-transform: uppercase;
        }
        .btn-archive:hover, .btn-return:hover {
            background: var(--accent);
            color: #000;
        }
        
        .btn-return {
            border-color: white;
            color: white;
            background: rgba(255,255,255,0.05);
        }
        .btn-return:hover {
            background: white;
            color: black;
        }
    </style>
</head>
<body>

    <div class="overlay">
        <div class="scanline"></div>
    </div>

    <div id="map"></div>

    <!-- Directional Indicators Container -->
    <div id="indicators"></div>

    <!-- Manifest Navigation -->
    <div id="manifestPanel" class="side-panel hidden">
        <div class="flex justify-between items-center mb-6">
            <h3 class="text-sm font-bold text-[#6BFF8A] tech-font">Data Manifest</h3>
            <button onclick="toggleManifest()" class="text-[10px] opacity-50 hover:opacity-100 p-2">[ HIDE ]</button>
        </div>
        <div id="manifestList" class="overflow-y-auto pr-2"></div>
    </div>

    <!-- Detail Panel -->
    <div id="sidePanel" class="side-panel hidden">
        <div class="flex justify-between items-start mb-4">
            <h2 id="eventTitle" class="text-xl font-bold text-[#6BFF8A] leading-tight pr-4 uppercase">Select Node</h2>
            <button onclick="closePanel()" class="text-xs opacity-50 hover:opacity-100 p-2 shrink-0">[ CLOSE ]</button>
        </div>
        <div class="text-[10px] text-[#6BFF8A] mb-4 tech-font opacity-70">
            Subject: <span id="eventSubject">N/A</span><br>
            Coordinates: <span id="eventCoords">N/A</span>
        </div>
        <div id="eventContent" class="overflow-y-auto text-sm leading-relaxed text-gray-300 border-t border-[#6BFF8A]/20 pt-4 pb-4">
            Select a highlighted data point on the map to decrypt historical records.
        </div>
        <div class="mt-auto pt-4 tech-font text-[9px] opacity-30 border-t border-white/5">
            VERIFIED_RECORD_774-B // ACCESS_PUBLIC // MU-TH-UR 6000
        </div>
    </div>

    <!-- Header Overlay -->
    <div id="mainHeader" class="absolute top-6 left-6 z-[1001] transition-opacity duration-500 pointer-events-auto max-w-[80%]">
        <div id="headerContent">
            <h1 class="text-2xl sm:text-3xl font-bold text-white mb-1 tracking-tighter">BRUGG <span class="text-[#6BFF8A]">MYTHS</span></h1>
            <div class="h-[1px] w-32 sm:w-40 bg-[#6BFF8A]/40 mb-4"></div>
            <button onclick="toggleManifest()" class="btn-archive">
                OPEN ARCHIVE MANIFEST
            </button>
        </div>
        
        <!-- Return to Brugg Button (Hidden by default) -->
        <div id="returnBox" class="hidden mt-2">
            <button onclick="returnToBrugg()" class="btn-return">
                RETURN TO BRUGG
            </button>
        </div>
    </div>

    <script>
        const events = [
            { id: 1, title: "The Black Tower", subject: "Residual Haunting", coords: [47.486070, 8.206665], content: "Built in the 12th century, the 'Schwarzer Turm' is Brugg's oldest structure. Locals report a silent figure watching from the upper windows during the winter solstice. Historical records mention a jailer who disappeared in 1644 without a trace.", type: "Ghost" },
            { id: 2, title: "Aare River Whispers", subject: "Auditory Phenomenon", coords: [47.4862, 8.2120], content: "At the narrowest point of the Aare, near the bridge, cyclists often report hearing their names called from beneath the rushing water. Legend speaks of 'River Maidens' pulling the curious into the currents.", type: "Myth" },
            { id: 3, title: "Vindonissa Ruins", subject: "Legionary Shadows", coords: [47.4795, 8.2215], content: "Former Roman Legion camp. Night guards recorded thermal anomalies in the shape of marching formations. Some say the 11th Legion never truly abandoned their post.", type: "Paranormal" },
            { id: 4, title: "Prophet's Alley", subject: "Prophetic Vision", coords: [47.4855, 8.2090], content: "A hidden passage where a local predicted the Great Fire of Brugg. Legend says walking the alley backwards at midnight reveals the town's ancient visage.", type: "Dark Event" },
            { id: 5, title: "The Siechenhaus", subject: "The Bell of the Unclean", coords: [47.4890, 8.2160], content: "Located beyond the city walls, this was an infirmary for lepers. They were forced to carry bells to warn citizens of their presence. Rhythmic clicking sounds are still reported nearby on moonless nights.", type: "Dark Event" },
            { id: 6, title: "Roman Curse Tablets", subject: "The Defixio of Vindonissa", coords: [47.4785, 8.2185], content: "Archaeologists found lead tablets used to hire underworld demons for spiritual hit-lists. The secret grudges of ancient legionaries are said to linger in the damp earth.", type: "Ancient Curse" },
            { id: 7, title: "The Three Knocks", subject: "The Tower's Hidden Vault", coords: [47.486120, 8.206750], content: "A tiny unmarked door on the Black Tower. Knocking three times is said to alert the 'Invisible Sentinel.' Some claim the door leads to a vault missing from all city plans.", type: "Secret Code" },
            { id: 8, title: "The Pope of Dross", subject: "The Great Comic Book Fire", coords: [47.483293, 8.207236], content: "In 1965, authorities held a public 'cleansing' of comic books. The phantom scent of scorched paper is said to linger near the site during dry evenings.", type: "Historical Cleansing" },
            { id: 9, title: "The Chlauschlöpfen", subject: "The Midnight Whip-Crackers", coords: [47.4852, 8.2076], content: "Ancient tradition where deafening whip-cracks echo through the streets to drive away winter spirits. Rhythmic and thunderous, it serves as a warning to both spirits and strangers.", type: "Ancient Ritual" },
            { id: 10, title: "The Rollibock", subject: "The Glacier Guardian", coords: [47.495050, 8.215560], content: "Massive ice-encrusted goat-like entity with glowing eyes. Protectors of nature, it punishes those who mistreat the environment with terrifying roars and clattering ice shards.", type: "Creature" },
            { id: 11, title: "The Youth Army", subject: "Civil Defense Tradition", coords: [47.4851, 8.2040], content: "Every July, the children of Brugg march with hazel rods adorned with flowers. While appearing as a charming pageant, its roots lie in a 16th-century civilian defense exercise.", type: "Ritual" },
            { id: 12, title: "Poisoner’s Sword", subject: "Capital Punishment", coords: [47.4856, 8.2078], content: "In the 18th century, Barbara Obrist was condemned for poisoning her husband. Her execution by sword left an indelible dark mark on the town’s judicial history.", type: "Dark Event" },
            { id: 13, title: "Red House Tragedy", subject: "Accidental Burial", coords: [47.4849, 8.2065], content: "During construction, the owner perished in a black cellar. The structure was completed over his body, trapping his spirit within the foundation.", type: "Ghost" },
            { id: 14, title: "Blood-Stained Meadow", subject: "Regicide", coords: [47.4806, 8.2183], content: "In 1308, King Albrecht I was assassinated in the fields of Windisch. Legends persist that the grass once grew a distinctive shade of crimson, nourished by royal blood.", type: "Historical" },
            { id: 15, title: "Bridge of Whispers", subject: "Liminal Phenomena", coords: [47.4908, 8.2325], content: "At the Water Castle convergence, the atmosphere grows unnervingly heavy. Ancient lore suggests the currents claim the souls of those who tarry.", type: "Myth" },
            { id: 16, title: "The Black Cat", subject: "Forest Maze Sentinel", coords: [47.4915, 8.2045], content: "A black cat that perches on shoulders of travelers in the woods. As long as it sits there, the traveler is cursed to wander the forest, unable to find the exit.", type: "Creature" },
            { id: 17, title: "The Night Folk", subject: "Spectral Procession", coords: [46.9631, 9.4419], content: "In Vättis, a spectral procession of the recently deceased emerges. One witness recognized his own double; within six weeks, the plague claimed 134 victims.", type: "Creature", sector: "Vättis" },
            { id: 18, title: "The Devil’s Bridge", subject: "Demonic Compact", coords: [46.6475, 8.5925], content: "Unable to span the Schöllenen Gorge, farmers invoked the Devil. Outsmarted by a goat, the Devil tried to crush the bridge with a boulder; the stone still rests in Göschenen.", type: "Creature", sector: "Schöllenen" },
            { id: 19, title: "The Black Spider", subject: "Demonic Infestation", coords: [47.0275, 7.7264], content: "In Sumiswald, a demonic pact resulted in venomous arachnids bursting from a woman’s skin. The spider remains sealed inside a wooden window post at a local farmhouse.", type: "Creature", sector: "Sumiswald" }
        ];

        const BRUGG_CENTER = [47.485, 8.210];
        const map = L.map('map', { zoomControl: false, attributionControl: false }).setView(BRUGG_CENTER, 15);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom: 20 }).addTo(map);
        L.control.zoom({ position: 'topright' }).addTo(map);

        const markers = [];

        function openEvent(event) {
            document.getElementById('eventTitle').innerText = event.title;
            document.getElementById('eventSubject').innerText = event.subject;
            document.getElementById('eventCoords').innerText = `${event.coords[0].toFixed(4)}, ${event.coords[1].toFixed(4)}`;
            document.getElementById('eventContent').innerText = event.content;
            document.getElementById('sidePanel').classList.remove('hidden');
            document.getElementById('manifestPanel').classList.add('hidden');
            const header = document.getElementById('mainHeader');
            header.classList.add('opacity-0');
            header.style.pointerEvents = 'none';
            const titleEl = document.getElementById('eventTitle');
            titleEl.style.color = (event.type === 'Creature') ? 'var(--accent-hazard)' : 'var(--accent)';
        }

        function closePanel() { 
            document.getElementById('sidePanel').classList.add('hidden'); 
            const header = document.getElementById('mainHeader');
            header.classList.remove('opacity-0');
            header.style.pointerEvents = 'auto';
        }

        function toggleManifest() { 
            const manifest = document.getElementById('manifestPanel');
            manifest.classList.toggle('hidden'); 
            if (!manifest.classList.contains('hidden')) document.getElementById('sidePanel').classList.add('hidden');
        }

        function returnToBrugg() {
            map.flyTo(BRUGG_CENTER, 15, { duration: 2 });
            closePanel();
        }

        const manifestList = document.getElementById('manifestList');
        events.forEach(event => {
            const isHazard = event.type === 'Creature';
            const icon = L.divIcon({
                className: 'custom-div-icon',
                html: `<div class="${isHazard ? 'marker-pulse-hazard' : 'marker-pulse'}"></div>`,
                iconSize: [20, 20],
                iconAnchor: [10, 10]
            });
            const marker = L.marker(event.coords, { icon: icon }).addTo(map);
            marker.on('click', () => {
                map.flyTo(event.coords, 17, { duration: 1.5 });
                openEvent(event);
            });
            markers.push({ marker, event });

            const item = document.createElement('div');
            item.className = 'manifest-item';
            const tag = event.sector ? `<span class="opacity-40 text-[9px] ml-1">[${event.sector}]</span>` : '';
            item.innerHTML = `<span>${event.id < 10 ? '0' + event.id : event.id} // ${event.title}${tag}</span>`;
            item.onclick = () => {
                map.flyTo(event.coords, 16, { duration: 2 });
                openEvent(event);
            };
            manifestList.appendChild(item);
        });

        // Directional Indicators Logic
        function updateIndicators() {
            const container = document.getElementById('indicators');
            const returnBox = document.getElementById('returnBox');
            container.innerHTML = '';
            
            const bounds = map.getBounds();
            const center = map.getCenter();
            
            // Check if we are "In Brugg" (Center distance check)
            const distToBrugg = Math.sqrt(Math.pow(center.lat - BRUGG_CENTER[0], 2) + Math.pow(center.lng - BRUGG_CENTER[1], 2));
            const isInsideBruggArea = distToBrugg < 0.05; // Roughly 5km radius check

            if (isInsideBruggArea) {
                returnBox.classList.add('hidden');
                
                // Only show triangles for 17, 18, 19
                const targetIds = [17, 18, 19];
                markers.forEach(({ marker, event }) => {
                    if (targetIds.includes(event.id)) {
                        const pos = marker.getLatLng();
                        if (!bounds.contains(pos)) {
                            const angle = Math.atan2(pos.lat - center.lat, pos.lng - center.lng);
                            const deg = (angle * 180 / Math.PI);
                            
                            const triangle = document.createElement('div');
                            triangle.className = 'edge-triangle';
                            
                            const padding = 60;
                            const w = window.innerWidth;
                            const h = window.innerHeight;
                            
                            let x = (w/2) + (Math.cos(angle) * w/2.2);
                            let y = (h/2) - (Math.sin(angle) * h/2.2);
                            
                            x = Math.max(padding, Math.min(w - padding, x));
                            y = Math.max(padding, Math.min(h - padding, y));

                            triangle.style.left = `${x}px`;
                            triangle.style.top = `${y}px`;
                            triangle.style.transform = `translate(-50%, -50%) rotate(${90-deg}deg)`;
                            
                            triangle.addEventListener('click', (e) => {
                                e.stopPropagation();
                                map.flyTo(event.coords, 16, { duration: 2 });
                                openEvent(event);
                            });
                            
                            container.appendChild(triangle);
                        }
                    }
                });
            } else {
                // We are outside Brugg
                returnBox.classList.remove('hidden');
            }
        }

        map.on('move zoom', updateIndicators);
        map.on('click', (e) => {
            if (e.originalEvent.target.id === 'map' || e.originalEvent.target.classList.contains('leaflet-container')) {
                closePanel();
                document.getElementById('manifestPanel').classList.add('hidden');
            }
        });

        window.addEventListener('resize', updateIndicators);
        updateIndicators();
    </script>
</body>
</html>
