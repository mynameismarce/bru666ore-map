<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Brugg // Paranormal Index</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;700&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #6BFF8A; /* Alien Phosphor Green */
            --accent-hazard: #ff3e3e;
            --bg: #0a0a0c;
            --panel: rgba(15, 15, 20, 0.95);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: #d1d1d1;
            margin: 0;
            overflow: hidden;
            touch-action: none;
        }

        h1, h2, h3, .tech-font {
            font-family: 'Space Grotesk', sans-serif;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        #map {
            height: 100vh;
            width: 100vw;
            background: #000;
        }

        .leaflet-container { background: #000 !important; }
        .leaflet-bar { border: 1px solid rgba(107, 255, 138, 0.5) !important; box-shadow: 0 0 10px rgba(0,0,0,0.5); }
        .leaflet-bar a { 
            background-color: var(--panel) !important; 
            color: var(--accent) !important; 
            border: none !important;
            width: 34px !important;
            height: 34px !important;
            line-height: 34px !important;
        }

        .side-panel {
            position: absolute;
            background: var(--panel);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(107, 255, 138, 0.2);
            z-index: 2000;
            padding: 24px;
            pointer-events: auto;
            display: flex;
            flex-direction: column;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #sidePanel {
            top: 20px;
            right: 20px;
            width: 380px;
            max-height: calc(100vh - 40px);
        }

        #manifestPanel {
            top: 140px;
            left: 20px;
            width: 300px;
            max-height: calc(100vh - 180px);
        }

        .side-panel.hidden { transform: translateX(120%); }
        #manifestPanel.hidden { transform: translateX(-120%); }

        @media (max-width: 640px) {
            #sidePanel {
                top: auto;
                bottom: 0;
                right: 0;
                left: 0;
                width: 100%;
                max-width: 100%;
                border-radius: 20px 20px 0 0;
                max-height: 70vh;
                padding: 20px;
            }
            #sidePanel.hidden { transform: translateY(100%); }
            #manifestPanel {
                top: 100px;
                left: 10px;
                right: 10px;
                width: auto;
                max-height: calc(100vh - 120px);
            }
        }

        /* Specialized Triangle Indicators */
        .edge-triangle {
            position: fixed;
            width: 0; 
            height: 0; 
            border-left: 10px solid transparent;
            border-right: 10px solid transparent;
            border-bottom: 16px solid #FFFFFF; /* Solid White */
            z-index: 1500;
            opacity: 0.8;
            pointer-events: auto;
            cursor: pointer;
            filter: drop-shadow(0 0 8px #FFFFFF);
            transition: opacity 0.2s, transform 0.1s;
        }
        
        .edge-triangle:hover {
            opacity: 1;
            filter: drop-shadow(0 0 12px #FFFFFF);
        }

        .scanline {
            width: 100%;
            height: 2px;
            background: rgba(107, 255, 138, 0.05);
            position: absolute;
            top: 0;
            animation: scan 10s linear infinite;
        }

        @keyframes scan {
            0% { top: 0; }
            100% { top: 100%; }
        }

        .marker-pulse {
            width: 14px;
            height: 14px;
            background: var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 0 rgba(107, 255, 138, 0.4);
            animation: pulse 2s infinite;
        }

        .marker-pulse-hazard {
            width: 18px;
            height: 18px;
            background: var(--accent-hazard);
            border-radius: 50%;
            box-shadow: 0 0 0 rgba(255, 62, 62, 0.4);
            animation: pulse-hazard 1.5s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(107, 255, 138, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(107, 255, 138, 0); }
            100% { box-shadow: 0 0 0 0 rgba(107, 255, 138, 0); }
        }

        @keyframes pulse-hazard {
            0% { box-shadow: 0 0 0 0 rgba(255, 62, 62, 0.7); }
            70% { box-shadow: 0 0 0 20px rgba(255, 62, 62, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 62, 62, 0); }
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--accent); }

        .manifest-item {
            border-bottom: 1px solid rgba(107, 255, 138, 0.1);
            padding: 12px 0;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .manifest-item:hover {
            color: var(--accent);
            padding-left: 8px;
            background: rgba(107, 255, 138, 0.05);
        }

        .btn-archive, .btn-return {
            pointer-events: auto;
            background: rgba(107, 255, 138, 0.05);
            border: 1px solid rgba(107, 255, 138, 0.3);
            padding: 8px 16px;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 10px;
            color: var(--accent);
            transition: all 0.3s;
            cursor: pointer;
            text-transform: uppercase;
        }
        .btn-archive:hover, .btn-return:hover {
            background: var(--accent);
            color: #000;
        }
        
        .btn-return {
            border-color: white;
            color: white;
            background: rgba(255,255,255,0.05);
        }
        .btn-return:hover {
            background: white;
            color: black;
        }
    </style>
</head>
<body>

    <div class="overlay">
        <div class="scanline"></div>
    </div>

    <div id="map"></div>

    <!-- Directional Indicators Container -->
    <div id="indicators"></div>

    <!-- Manifest Navigation -->
    <div id="manifestPanel" class="side-panel hidden">
        <div class="flex justify-between items-center mb-6">
            <h3 class="text-sm font-bold text-[#6BFF8A] tech-font">Data Manifest</h3>
            <button onclick="toggleManifest()" class="text-[10px] opacity-50 hover:opacity-100 p-2">[ HIDE ]</button>
        </div>
        <div id="manifestList" class="overflow-y-auto pr-2"></div>
    </div>

    <!-- Detail Panel -->
    <div id="sidePanel" class="side-panel hidden">
        <div class="flex justify-between items-start mb-4">
            <h2 id="eventTitle" class="text-xl font-bold text-[#6BFF8A] leading-tight pr-4 uppercase">Select Node</h2>
            <button onclick="closePanel()" class="text-xs opacity-50 hover:opacity-100 p-2 shrink-0">[ CLOSE ]</button>
        </div>
        <div class="text-[10px] text-[#6BFF8A] mb-4 tech-font opacity-70">
            Subject: <span id="eventSubject">N/A</span><br>
            Coordinates: <span id="eventCoords">N/A</span>
        </div>
        <div id="eventContent" class="overflow-y-auto text-sm leading-relaxed text-gray-300 border-t border-[#6BFF8A]/20 pt-4 pb-4">
            Select a highlighted data point on the map to decrypt historical records.
        </div>
        <div class="mt-auto pt-4 tech-font text-[9px] opacity-30 border-t border-white/5">
            VERIFIED_RECORD_774-B // ACCESS_PUBLIC // MU-TH-UR 6000
        </div>
    </div>

    <!-- Header Overlay -->
    <div id="mainHeader" class="absolute top-6 left-6 z-[1001] transition-opacity duration-500 pointer-events-auto max-w-[80%]">
        <div id="headerContent">
            <h1 class="text-2xl sm:text-3xl font-bold text-white mb-1 tracking-tighter">BRUGG <span class="text-[#6BFF8A]">MYTHS</span></h1>
            <div class="h-[1px] w-32 sm:w-40 bg-[#6BFF8A]/40 mb-4"></div>
            <button onclick="toggleManifest()" class="btn-archive">
                OPEN ARCHIVE MANIFEST
            </button>
        </div>
        
        <!-- Return to Brugg Button (Hidden by default) -->
        <div id="returnBox" class="hidden mt-2">
            <button onclick="returnToBrugg()" class="btn-return">
                RETURN TO BRUGG
            </button>
        </div>
    </div>

    <script>
        const events = [
            { id: 1, title: "The Black Tower", subject: "RESIDUAL HAUNTING", coords: [47.4861, 8.2067], content: "The 'Schwarzer Turm' is Brugg's oldest structure. During the winter solstice, a silent figure stares down at the passerbys. Historical records mention a jailer who vanished inside the structure in 1644.", type: "Ghost" },
            { id: 2, title: "Aare River Whispers", subject: "ACOUSTIC PHENOMENON", coords: [47.4862, 8.2120], content: "At the narrowest point of the Aare River, bypassers report hearing their names called in different languages from beneath the wild waters. Legend speaks of the 'River Maidens' dragging the unaware down into the currents.", type: "Myth" },
            { id: 3, title: "Vindonissa Ruins", subject: "UMBRA LEGIONARII", coords: [47.4795, 8.2215], content: "At an ancient Roman Legion camp, researchers are still recording heat anomalies in the shape of marching formations. Some say the 11th Legion never truly abandoned their post and will impale any trespassers.", type: "Paranormal" },
            { id: 4, title: "Prophet's Alley", subject: "PROPHETIC VISION", coords: [47.4855, 8.2090], content: "A hidden passage where a local predicted the Great Fire of Brugg. Legend says that walking the alley backwards at midnight creates a rift that reveals the town's ancient visage.", type: "Dark Event" },
            { id: 5, title: "The Siechenhaus", subject: "THE CALL OF THE UNCLEAN", coords: [47.4890, 8.2160], content: "An infirmary for lepers was located beyond the city walls. They were forced to carry bells around their necks to warn citizens of their presence. The rusty sound of old clanking bells are still reported on moonless nights.", type: "Dark Event" },
            { id: 6, title: "Roman Demon Tablets", subject: "DEFIXIO DIABOLI", coords: [47.4785, 8.2185], content: "Archaeologists unearthed lead tablets that were used to summon underworld demons, which would execute spiritual hit-lists. Those who find the tablets and understand the carved writings have power over such unholy creatures.", type: "Ancient Curse" },
            { id: 7, title: "The Three Knocks", subject: "THE TOWER'S HIDDEN VAULT", coords: [47.4861, 8.2067], content: "A tiny unmarked door was found in Brugg’s Black Tower. Ancient writings claim that it serves as a passageway to an unknown vault that extends all under the streets, and that is missing from every city plan.", type: "Secret Code" },
            { id: 8, title: "The Pope of Dross", subject: "A BONFIRE OF WORDS", coords: [47.4833, 8.2072], content: "In 1965, a public burning of comic books and non-sanctioned publications took place in the city. The echo of the evening chants, and the scent of scorched paper overcomes those who still remember the forbidden writings.", type: "Historical Cleansing" },
            { id: 9, title: "The Chlauschlöpfen", subject: "THE MIDNIGHT WHIP-CRACKERS", coords: [47.4852, 8.2076], content: "An ancient tradition where powerful whip-cracks were used to exorcise the evil winter spirits. Sharp and rhythmic, they still serve as a last warning to both spirits and strangers, before they get bound back to hell.", type: "Ancient Ritual" },
            { id: 10, title: "The Rollibock", subject: "NATURE’S WRATH", coords: [47.4950, 8.2156], content: "A massive goat-like entity with fiery glowing eyes. A protector of nature that punishes those who mistreat the environment. The only way to atone for your sins is to become a living part of the icy landscape.", type: "Creature" },
            { id: 11, title: "The Night Folk", subject: "DAS NACHTVOLK PROCESSION", coords: [47.4851, 8.2078], content: "A spectral midnight procession of the recently deceased, taking place near the Stadtkirche. You may witness your own doppelgänger in the line, and that means that death will find you within six weeks.", type: "Creature" },
            { id: 12, title: "The Black Cat", subject: "FOREST SENTINEL", coords: [47.4915, 8.2045], content: "A local Bruggerberg myth. A black cat that perches on the shoulders of travelers in the woods. As long as the enigmatic creature follows you, you are unable to find the exit.", type: "Creature" },
            { id: 13, title: "The Youth Army", subject: "CIVIL DEFENSE TRADITION", coords: [47.4851, 8.2040], content: "In the month of July, children of Brugg march wielding hazel rods adorned with flowers. This charming local pageant is actually a 16th-century civilian defense exercise. A town-wide \"vigil\" that keeps the streets safe.", type: "Ritual" },
            { id: 14, title: "The Poisoner’s Sword", subject: "CAPITAL BETRAYAL", coords: [47.4856, 8.2078], content: "In the 18th century, Barbara Obrist poisoned her husband and was condemned to death. Her sensational trial and subsequent execution remains a chilling reminder of the thin line between domestic life and ultimate retribution.", type: "Dark Event" },
            { id: 15, title: "The Red House Tragedy", subject: "ACCIDENTAL BURIAL", coords: [47.4849, 8.2065], content: "During the construction of the Rotes Haus, the owner plummeted into a half-finished cellar and perished. Tradition tells that the structure was completed directly over his body, effectively trapping his spirit forever.", type: "Ghost" },
            { id: 16, title: "The Blood-Stained Meadow", subject: "REGICIDE RED", coords: [47.4806, 8.2183], content: "In 1308, King Albrecht I of Habsburg was brutally killed by his own nephew. Queen Elizabeth commissioned the Königsfelden Monastery on the site of the murder, but the grass still grows with a shade of crimson royal blood.", type: "Historical" },
            { id: 17, title: "The Bridge of Whispers", subject: "LIMINAL PHENOMENA", coords: [47.4908, 8.2325], content: "At the \"Water Castle,\" where the Aare, Reuss, and Limmat rivers converge, the currents \"claim\" the souls of those who stay too long on the bridge, and the water whispers the secrets of the dead in a triple-tongued chorus.", type: "Myth" },
            { id: 18, title: "The Devil’s Bridge", subject: "THE SCHÖLLENEN GORGE", coords: [46.6475, 8.5925], content: "The local farmers tricked the Devil into building a bridge in exchange for the first soul to cross it, but instead sent a goat. The Devil then dropped a massive boulder that still rests in Göschenen, marked by a holy cross.", type: "Creature", sector: "Schöllenen" },
            { id: 19, title: "The Black Spider", subject: "ARACHNID INFESTATION", coords: [47.0275, 7.7264], content: "A pact with a demonic huntsman resulted in a plague of venomous spiders bursting from the locals’ skin. The plague was halted when the \"Black Spider\" was sealed in a local farmhouse… that still hosts the dormant evil.", type: "Creature", sector: "Sumiswald" }
        ];

        const BRUGG_CENTER = [47.485, 8.210];
        const map = L.map('map', { zoomControl: false, attributionControl: false }).setView(BRUGG_CENTER, 15);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom: 20 }).addTo(map);
        L.control.zoom({ position: 'topright' }).addTo(map);

        const markers = [];

        function openEvent(event) {
            document.getElementById('eventTitle').innerText = event.title;
            document.getElementById('eventSubject').innerText = event.subject;
            document.getElementById('eventCoords').innerText = `${event.coords[0].toFixed(4)}, ${event.coords[1].toFixed(4)}`;
            document.getElementById('eventContent').innerText = event.content;
            document.getElementById('sidePanel').classList.remove('hidden');
            document.getElementById('manifestPanel').classList.add('hidden');
            const header = document.getElementById('mainHeader');
            header.classList.add('opacity-0');
            header.style.pointerEvents = 'none';
            const titleEl = document.getElementById('eventTitle');
            titleEl.style.color = (event.type === 'Creature') ? 'var(--accent-hazard)' : 'var(--accent)';
        }

        function closePanel() { 
            document.getElementById('sidePanel').classList.add('hidden'); 
            const header = document.getElementById('mainHeader');
            header.classList.remove('opacity-0');
            header.style.pointerEvents = 'auto';
        }

        function toggleManifest() { 
            const manifest = document.getElementById('manifestPanel');
            manifest.classList.toggle('hidden'); 
            if (!manifest.classList.contains('hidden')) document.getElementById('sidePanel').classList.add('hidden');
        }

        function returnToBrugg() {
            map.flyTo(BRUGG_CENTER, 15, { duration: 2 });
            closePanel();
        }

        const manifestList = document.getElementById('manifestList');
        events.forEach(event => {
            const isHazard = event.type === 'Creature';
            const icon = L.divIcon({
                className: 'custom-div-icon',
                html: `<div class="${isHazard ? 'marker-pulse-hazard' : 'marker-pulse'}"></div>`,
                iconSize: [20, 20],
                iconAnchor: [10, 10]
            });
            const marker = L.marker(event.coords, { icon: icon }).addTo(map);
            marker.on('click', () => {
                map.flyTo(event.coords, 17, { duration: 1.5 });
                openEvent(event);
            });
            markers.push({ marker, event });

            const item = document.createElement('div');
            item.className = 'manifest-item';
            const tag = event.sector ? `<span class="opacity-40 text-[9px] ml-1">[${event.sector}]</span>` : '';
            item.innerHTML = `<span>${event.id < 10 ? '0' + event.id : event.id} // ${event.title}${tag}</span>`;
            item.onclick = () => {
                map.flyTo(event.coords, 16, { duration: 2 });
                openEvent(event);
            };
            manifestList.appendChild(item);
        });

        // Directional Indicators Logic
        function updateIndicators() {
            const container = document.getElementById('indicators');
            const returnBox = document.getElementById('returnBox');
            container.innerHTML = '';
            
            const bounds = map.getBounds();
            const center = map.getCenter();
            
            // Check if we are "In Brugg" (Center distance check)
            const distToBrugg = Math.sqrt(Math.pow(center.lat - BRUGG_CENTER[0], 2) + Math.pow(center.lng - BRUGG_CENTER[1], 2));
            const isInsideBruggArea = distToBrugg < 0.05; // Roughly 5km radius check

            if (isInsideBruggArea) {
                returnBox.classList.add('hidden');
                
                // Show triangles for 18 and 19 (External items in the current list)
                const targetIds = [18, 19];
                markers.forEach(({ marker, event }) => {
                    if (targetIds.includes(event.id)) {
                        const pos = marker.getLatLng();
                        if (!bounds.contains(pos)) {
                            const angle = Math.atan2(pos.lat - center.lat, pos.lng - center.lng);
                            const deg = (angle * 180 / Math.PI);
                            
                            const triangle = document.createElement('div');
                            triangle.className = 'edge-triangle';
                            
                            const padding = 60;
                            const w = window.innerWidth;
                            const h = window.innerHeight;
                            
                            let x = (w/2) + (Math.cos(angle) * w/2.2);
                            let y = (h/2) - (Math.sin(angle) * h/2.2);
                            
                            x = Math.max(padding, Math.min(w - padding, x));
                            y = Math.max(padding, Math.min(h - padding, y));

                            triangle.style.left = `${x}px`;
                            triangle.style.top = `${y}px`;
                            triangle.style.transform = `translate(-50%, -50%) rotate(${90-deg}deg)`;
                            
                            triangle.addEventListener('click', (e) => {
                                e.stopPropagation();
                                map.flyTo(event.coords, 16, { duration: 2 });
                                openEvent(event);
                            });
                            
                            container.appendChild(triangle);
                        }
                    }
                });
            } else {
                // We are outside Brugg center
                returnBox.classList.remove('hidden');
            }
        }

        map.on('move zoom', updateIndicators);
        map.on('click', (e) => {
            if (e.originalEvent.target.id === 'map' || e.originalEvent.target.classList.contains('leaflet-container')) {
                closePanel();
                document.getElementById('manifestPanel').classList.add('hidden');
            }
        });

        window.addEventListener('resize', updateIndicators);
        updateIndicators();
    </script>
</body>
</html>
